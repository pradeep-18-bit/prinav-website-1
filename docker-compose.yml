services:
  backend:
    container_name: pirnav-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      JwtSettings__Key: ${JwtSettings__Key}
      JwtSettings__Issuer: ${JwtSettings__Issuer}
      JwtSettings__Audience: ${JwtSettings__Audience}
      JwtSettings__DurationInMinutes: ${JwtSettings__DurationInMinutes}
      EmailSettings__SmtpServer: ${EmailSettings__SmtpServer}
      EmailSettings__Port: ${EmailSettings__Port}
      EmailSettings__SenderName: ${EmailSettings__SenderName}
      EmailSettings__SenderEmail: ${EmailSettings__SenderEmail}
      EmailSettings__Password: ${EmailSettings__Password}
      EmailSettings__HrEmail: ${EmailSettings__HrEmail}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - backend-resumes:/app/wwwroot/resumes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - web

  frontend:
    container_name: pirnav-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  backend-resumes:
